<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporte Técnico - Escuela Superior Vocacional Pablo Colon Berdecia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter','Segoe UI',system-ui,sans-serif;
      background:linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%);
      min-height:100vh;color:#1e293b;line-height:1.6;padding:2rem
    }
    h1{text-align:center;color:#2c5282;margin-bottom:2rem;font-weight:600}
    .top-bar{display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
    .back-btn{
      display:inline-block;background:linear-gradient(135deg,#2c5282 0%,#4299e1 100%);
      color:white;padding:.75rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600
    }
    .filters{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;
      margin-bottom:1.5rem;background:white;padding:1rem;border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,.08)
    }
    .filters input{
      width:100%;padding:.85rem 1rem;border:2px solid #e2e8f0;border-radius:10px;
      font-size:.95rem;font-family:inherit
    }
    table{
      width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;
      box-shadow:0 4px 15px rgba(0,0,0,.08)
    }
    thead{background:#f8fafc}
    th,td{
      padding:1rem;text-align:left;font-weight:500;color:#374151;border-bottom:2px solid #e2e8f0;
      vertical-align:top
    }
    tbody tr:hover{background-color:#eef2ff}
    .star{color:#fbbf24;font-size:1.2rem;margin-right:.1rem}
    .no-ratings{text-align:center;margin-top:3rem;font-size:1.2rem;color:#6b7280}
    .comments{color:#4a5568;font-size:.9rem;margin-top:.25rem;font-style:italic}
    .date{color:#64748b;font-size:.85rem}
    .btn-details,.btn-delete{
      color:white;padding:.5rem 1rem;border:none;border-radius:6px;font-size:.9rem;font-weight:600;
      cursor:pointer;transition:all .3s ease;margin-right:.5rem
    }
    .btn-details{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}
    .btn-delete{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}
    .modal{
      display:none;position:fixed;z-index:1000;inset:0;background-color:rgba(0,0,0,.5)
    }
    .modal-content{
      background-color:white;margin:5% auto;padding:2rem;border-radius:12px;width:90%;max-width:700px;
      max-height:80vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.3)
    }
    .modal-header{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;
      border-bottom:2px solid #e2e8f0;padding-bottom:1rem
    }
    .modal-title{color:#2c5282;font-size:1.5rem;font-weight:600;margin:0}
    .close{color:#6b7280;font-size:2rem;font-weight:bold;cursor:pointer}
    .detail-item{margin-bottom:1rem;display:flex;align-items:flex-start;gap:1rem}
    .detail-label{font-weight:600;color:#374151;min-width:180px}
    .detail-value{color:#6b7280;flex:1}
    .signature-img{max-width:100%;height:auto;border:1px solid #e2e8f0;border-radius:8px}
    @media (max-width:768px){
      body{padding:1rem}
      table{display:block;overflow-x:auto}
      .detail-item{flex-direction:column;gap:.35rem}
      .detail-label{min-width:auto}
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="dashboard.html" class="back-btn">← Volver al Panel de Administración</a>
  </div>

  <h1>Reporte Técnico</h1>

  <div class="filters">
    <input type="text" id="filterTechnician" placeholder="Buscar por técnico">
    <input type="text" id="filterTeacher" placeholder="Buscar por maestro">
    <input type="date" id="filterDate">
  </div>

  <table>
    <thead>
      <tr>
        <th>Técnico</th>
        <th>Maestro</th>
        <th>Calificación</th>
        <th>Comentarios</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="ratingsTableBody"></tbody>
  </table>

  <div id="noRatingsMessage" class="no-ratings" style="display:none;">
    No hay reportes técnicos registrados aún.
  </div>

  <div class="modal" id="detailsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Detalles de la Calificación</h2>
        <span class="close" id="closeModal">&times;</span>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://alqdcxtzwximorkkyecp.supabase.co",
      "sb_publishable_V6kHfLnjsyODWSgJXJ9igg_gv1QPebb"
    );

    const tbody = document.getElementById('ratingsTableBody');
    const noRatingsMessage = document.getElementById('noRatingsMessage');
    const filterTechnician = document.getElementById('filterTechnician');
    const filterTeacher = document.getElementById('filterTeacher');
    const filterDate = document.getElementById('filterDate');

    let allRatings = [];

    function normalize(value) {
      return (value || '').toString().trim().toLowerCase();
    }

    function renderStars(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += `<span class="star">${i <= rating ? '★' : '☆'}</span>`;
      }
      return stars;
    }

    function applyFilters() {
      const techValue = normalize(filterTechnician.value);
      const teacherValue = normalize(filterTeacher.value);
      const dateValue = filterDate.value;

      const filtered = allRatings.filter(item => {
        const techMatch = !techValue || normalize(item.technician).includes(techValue);
        const teacherMatch = !teacherValue || normalize(item.teacher).includes(teacherValue);
        const itemDate = item.service_date || (item.created_at ? new Date(item.created_at).toISOString().slice(0, 10) : '');
        const dateMatch = !dateValue || itemDate === dateValue;
        return techMatch && teacherMatch && dateMatch;
      });

      renderTable(filtered);
    }

    function renderTable(ratings) {
      tbody.innerHTML = '';

      if (!ratings.length) {
        noRatingsMessage.style.display = 'block';
        noRatingsMessage.textContent = 'No hay reportes que coincidan con los filtros.';
        return;
      }

      noRatingsMessage.style.display = 'none';

      ratings.forEach(rating => {
        const tr = document.createElement('tr');
        // Usar un índice o id para identificar el registro
        const rowId = rating.id || rating._localId || '';

        tr.innerHTML = `
          <td>${rating.technician || 'N/A'}</td>
          <td>${rating.teacher || 'N/A'}</td>
          <td>${renderStars(rating.rating || 0)}</td>
          <td>${rating.observations ? `<div class="comments">${rating.observations}</div>` : '-'}</td>
          <td class="date">${rating.service_date || (rating.created_at ? new Date(rating.created_at).toLocaleString() : '')}</td>
          <td>
            <button class="btn-details" data-id="${rowId}">Ver Detalles</button>
            <button class="btn-delete" data-delete-id="${rowId}">Eliminar</button>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    // DELEGACIÓN DE EVENTOS en el tbody (más robusto que listeners individuales)
    tbody.addEventListener('click', (e) => {
      const btnDetails = e.target.closest('.btn-details');
      const btnDelete = e.target.closest('.btn-delete');

      if (btnDetails) {
        const id = btnDetails.dataset.id;
        console.log('Clic en Ver Detalles, id:', id);

        // Buscar en allRatings por id o por índice
        let rating = allRatings.find(r => String(r.id) === String(id));

        // Si no tiene id, buscar por otros campos únicos
        if (!rating && allRatings.length > 0) {
          // Intentar buscar por índice si el id está vacío
          const rowIndex = Array.from(tbody.children).indexOf(btnDetails.closest('tr'));
          if (rowIndex >= 0 && rowIndex < allRatings.length) {
            rating = allRatings[rowIndex];
          }
        }

        if (rating) {
          showDetailsModal(rating);
        } else {
          console.error('No se encontró el registro con id:', id);
          alert('Error: no se pudo encontrar el registro. Revisa la consola (F12)');
        }
      }

      if (btnDelete) {
        const id = btnDelete.dataset.deleteId;
        console.log('Clic en Eliminar, id:', id);
        deleteRating(id);
      }
    });

    function showDetailsModal(rating) {
      try {
        const modal = document.getElementById('detailsModal');
        const modalBody = document.getElementById('modalBody');

        // Función segura para mostrar valores
        const val = (v) => {
          if (v === null || v === undefined) return 'N/A';
          if (Array.isArray(v)) return v.join(', ') || 'N/A';
          return String(v);
        };

        const stars = '★'.repeat(rating.rating || 0) + '☆'.repeat(5 - (rating.rating || 0));
        const fechaRegistro = rating.created_at ? new Date(rating.created_at).toLocaleString() : '';

        modalBody.innerHTML = `
          <div class="detail-item">
            <div class="detail-label">Código de Seguimiento:</div>
            <div class="detail-value">${val(rating.codigo_seguimiento)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Fecha del Servicio:</div>
            <div class="detail-value">${val(rating.service_date)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Nombre del Técnico:</div>
            <div class="detail-value">${val(rating.technician)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Grado y Grupo:</div>
            <div class="detail-value">${val(rating.student_grade)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Nombre del Maestro:</div>
            <div class="detail-value">${val(rating.teacher)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Área / Salón:</div>
            <div class="detail-value">${val(rating.area_room)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Tipos de Servicio:</div>
            <div class="detail-value">${val(rating.service_types)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Equipos Atendidos:</div>
            <div class="detail-value">${val(rating.equipment_types)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Descripción del Problema:</div>
            <div class="detail-value">${val(rating.problem_description)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Solución Implementada:</div>
            <div class="detail-value">${val(rating.service_solution)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Estado del Servicio:</div>
            <div class="detail-value">${val(rating.service_status)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Observaciones:</div>
            <div class="detail-value">${val(rating.observations)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Firma del Técnico:</div>
            <div class="detail-value">
              ${rating.technician_signature
                ? `<img src="${rating.technician_signature}" alt="Firma del Técnico" class="signature-img" />`
                : 'No disponible'}
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Firma del Maestro:</div>
            <div class="detail-value">
              ${rating.teacher_signature
                ? `<img src="${rating.teacher_signature}" alt="Firma del Maestro" class="signature-img" />`
                : 'No disponible'}
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Calificación:</div>
            <div class="detail-value">${stars}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Fecha de Registro:</div>
            <div class="detail-value">${fechaRegistro}</div>
          </div>
        `;

        modal.style.display = 'block';
        console.log('Modal abierto para:', rating.technician, '/', rating.teacher);
      } catch (err) {
        console.error('Error mostrando modal:', err);
        alert('Error al mostrar detalles: ' + err.message);
      }
    }

    async function deleteRating(id) {
      if (!id) {
        alert('Error: ID no válido');
        return;
      }

      const confirmed = confirm('¿Seguro que deseas eliminar esta calificación?');
      if (!confirmed) return;

      const { error } = await supabase
        .from('reportes_tecnicos')
        .delete()
        .eq('id', id);

      if (error) {
        alert('No se pudo eliminar: ' + error.message);
        return;
      }

      await loadRatings();
    }

    async function loadRatings() {
      noRatingsMessage.style.display = 'block';
      noRatingsMessage.textContent = 'Cargando datos...';

      try {
        const { data, error } = await supabase
          .from('reportes_tecnicos')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error Supabase:', error);
          noRatingsMessage.innerHTML = `
            <div style="color:#dc2626;">
              <strong>❌ ${error.message}</strong><br><br>
              <span style="font-size:0.9rem;color:#6b7280;">
                Abre Supabase → SQL Editor y ejecuta el archivo <code>supabase-calificaciones.sql</code>
              </span>
            </div>
          `;
          return;
        }

        // DEDUPLICAR por id (por si hay registros duplicados en la base de datos)
        const uniqueMap = new Map();
        (data || []).forEach(item => {
          const key = item.id || JSON.stringify(item);
          if (!uniqueMap.has(key)) {
            uniqueMap.set(key, item);
          }
        });
        allRatings = Array.from(uniqueMap.values());

        console.log('Registros cargados:', allRatings.length);
        if (allRatings.length > 0) {
          console.log('Primer registro:', allRatings[0]);
        }

        if (allRatings.length === 0) {
          noRatingsMessage.textContent = 'No hay reportes técnicos registrados aún.';
          tbody.innerHTML = '';
          return;
        }

        applyFilters();
      } catch (err) {
        console.error('Error cargando datos:', err);
        noRatingsMessage.textContent = 'Error: ' + err.message;
      }
    }

    document.getElementById('closeModal').onclick = () => {
      document.getElementById('detailsModal').style.display = 'none';
    };

    window.onclick = (event) => {
      const modal = document.getElementById('detailsModal');
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    };

    filterTechnician.addEventListener('input', applyFilters);
    filterTeacher.addEventListener('input', applyFilters);
    filterDate.addEventListener('change', applyFilters);

    document.addEventListener('DOMContentLoaded', async () => {
      await loadRatings();

      supabase
        .channel('reportes-tecnicos-realtime')
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'reportes_tecnicos' },
          async () => {
            await loadRatings();
          }
        )
        .subscribe();
    });
  </script>
</body>
</html>
