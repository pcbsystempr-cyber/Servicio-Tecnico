<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Escuela Superior Vocacional Pablo Colon Berdecia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            color: #1e293b;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .school-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c5282;
            margin-bottom: 0.5rem;
        }

        .department-name {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c5282;
            margin-bottom: 2rem;
        }

        .role-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .role-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            color: #374151;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn.active {
            border-color: #1d4ed8;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }

        .login-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: #1d4ed8;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 1.2rem;
        }

        .toggle-password:hover {
            color: #1d4ed8;
        }

        .login-btn {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #1d4ed8;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .school-name {
                font-size: 1.5rem;
            }

            .department-name {
                font-size: 1rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .role-buttons {
                flex-direction: column;
            }
        }
    </style>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
    </script>
    <style>
        .dark-mode-toggle { position: fixed; top: 1rem; right: 4rem; z-index: 9999; }
        .dark-mode-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .dark-mode-switch input { opacity: 0; width: 0; height: 0; }
        .dark-mode-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 26px; }
        .dark-mode-slider:before { position: absolute; content: "🌙"; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; font-size: 14px; text-align:center; }
        .dark-mode-switch input:checked + .dark-mode-slider { background-color: #1e293b; }
        .dark-mode-switch input:checked + .dark-mode-slider:before { transform: translateX(24px); }
        body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; }
        body.dark-mode .login-container { background: #1e293b; }
        body.dark-mode .login-card { background: #334155; }
        body.dark-mode input { background: #475569; border-color: #64748b; color: #e2e8f0; }
        body.dark-mode .role-btn { background: #475569; color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="dark-mode-toggle">
        <label class="dark-mode-switch">
            <input type="checkbox" id="darkModeToggle" ${localStorage.getItem('darkMode') === 'enabled' ? 'checked' : ''}>
            <span class="dark-mode-slider"></span>
        </label>
    </div>
    <div class="login-container">
        <div class="school-name">Escuela Superior Vocacional Pablo Colón Berdecia</div>
        <div class="department-name">Departamento de Tecnología - COMPUTEC</div>

        <h2 class="login-title">Iniciar Sesión</h2>

        <div class="role-buttons">
            <button class="role-btn active" id="adminBtn">Administrador</button>
            <button class="role-btn" id="techBtn">Técnico</button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" class="login-input" placeholder="Ingrese su nombre de usuario" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" class="login-input" placeholder="Ingrese su contraseña" required>
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Ingresar</button>
        </form>

        <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>

        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let loginType = 'admin';
            const adminBtn = document.getElementById('adminBtn');
            const techBtn = document.getElementById('techBtn');
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');

            // Get role from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');

            if (role === 'admin') {
                loginType = 'admin';
                adminBtn.classList.add('active');
                techBtn.classList.remove('active');
            } else if (role === 'technician') {
                loginType = 'technician';
                techBtn.classList.add('active');
                adminBtn.classList.remove('active');
            }

            // Role selection
            adminBtn.addEventListener('click', function() {
                loginType = 'admin';
                this.classList.add('active');
                techBtn.classList.remove('active');
            });

            techBtn.addEventListener('click', function() {
                loginType = 'technician';
                this.classList.add('active');
                adminBtn.classList.remove('active');
            });

            // Password visibility toggle
            togglePasswordBtn.addEventListener('click', function() {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    togglePasswordBtn.textContent = '🙈';
                } else {
                    passwordInput.type = 'password';
                    togglePasswordBtn.textContent = '👁️';
                }
            });

            // Handle login submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                // Get registered users
                const registeredUsers = JSON.parse(localStorage.getItem('registered_users') || '[]');

                // Disable button and show loading
                loginBtn.disabled = true;
                loginBtn.textContent = 'Verificando...';

                // Simple authentication (in production, this would connect to a backend)
                setTimeout(() => {
                    // Check hardcoded admin account
                    if (loginType === 'admin' && username === 'Admin' && password === 'Computec2026') {
                        // Store authentication status for admin
                        localStorage.setItem('admin_authenticated', 'true');
                        localStorage.setItem('admin_username', username);

                        // Redirect to admin dashboard
                        window.location.href = 'dashboard.html';
                    }
                    // Check hardcoded technician account
                    else if (loginType === 'technician' && username === 'Tecnico' && password === 'Tecnico2026') {
                        // Store authentication status for technician
                        localStorage.setItem('tech_authenticated', 'true');
                        localStorage.setItem('tech_username', username);

                        // Redirect to technician page
                        window.location.href = 'calificar.html';
                    }
                    // Check registered users
                    else {
                        const user = registeredUsers.find(u => u.username === username && u.password === password && u.role === loginType);
                        if (user) {
                            if (loginType === 'admin') {
                                localStorage.setItem('admin_authenticated', 'true');
                                localStorage.setItem('admin_username', username);
                                window.location.href = 'dashboard.html';
                            } else if (loginType === 'technician') {
                                localStorage.setItem('tech_authenticated', 'true');
                                localStorage.setItem('tech_username', username);
                                window.location.href = 'calificar.html';
                            }
                        } else {
                            loginError.style.display = 'block';
                            loginBtn.disabled = false;
                            loginBtn.textContent = 'Ingresar';
                        }
                    }
                }, 1000);
            });
        });

        // Dark mode toggle
        const dm = document.getElementById('darkModeToggle');
        dm?.addEventListener('change', function() {
            const isDark = document.body.classList.toggle('dark-mode', this.checked);
            localStorage.setItem('darkMode', this.checked ? 'enabled' : 'disabled');
            window.dispatchEvent(new Event('darkModeSync'));
        });
        window.addEventListener('darkModeSync', () => {
            const isDark = localStorage.getItem('darkMode') === 'enabled';
            document.body.classList.toggle('dark-mode', isDark);
            if (dm) dm.checked = isDark;
        });
    </script>
</body>
</html>
