<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud enviada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      padding: 1.5rem;
      color: #1e293b;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      padding: 3rem 2rem;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      color: #166534;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      color: #475569;
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn {
      text-decoration: none;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.25s ease;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #0f766e 0%, #0d9488 100%);
      color: white;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(13, 148, 136, 0.25);
    }

    @media (max-width: 640px) {
      .buttons {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 2.25rem 1.25rem;
      }

      h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>¡Solicitud enviada exitosamente!</h1>
    <p>Su solicitud fue registrada correctamente en el sistema. El equipo técnico podrá verla y darle seguimiento.</p>

    <div class="buttons">
      <a class="btn btn-primary" href="index.html">Solicitar otro servicio técnico</a>
      <a class="btn btn-secondary" href="https://pcbsystempr-cyber.github.io/pcbsystem/" target="_blank" rel="noopener noreferrer">Ir al PCB System</a>
    </div>
  </div>
</body>
</html>
